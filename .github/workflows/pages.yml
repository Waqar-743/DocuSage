name: Deploy DocuSage Website

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: DocuSage/package-lock.json

      - name: Install dependencies
        working-directory: DocuSage
        run: npm ci

      - name: Build website
        working-directory: DocuSage
        run: npm run build
        env:
          VITE_BASE: /DocuSage/

      - name: Disable Jekyll processing
        run: touch DocuSage/dist/.nojekyll

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: DocuSage/dist
          force_orphan: true
