name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build (Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: DocuSage/package-lock.json

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Install Protobuf compiler
        uses: arduino/setup-protoc@v3
        with:
          version: "28.x"

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: DocuSage/src-tauri -> target
          cache-all-crates: true

      - name: Install frontend dependencies
        working-directory: DocuSage
        run: npm ci

      - name: Build and create GitHub release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: DocuSage ${{ github.ref_name }}
          releaseBody: |
            ## DocuSage ${{ github.ref_name }} — In-App Model Manager & RAG Diagnostics

            ### What's new

            #### In-App Model Downloader
            - Download GGUF models directly inside DocuSage — no manual file management
            - Live progress bar with byte/percent display during download
            - Models land in the app's data directory automatically

            #### Downloaded Models Panel (Settings → Downloaded)
            - Lists every `.gguf` file on your machine
            - **Connect Now** loads the model into the active chat session instantly
            - Connected model shows a green indicator; button becomes **Disconnect**
            - **Delete** (trash) icon permanently removes the file (blocked while connected)

            #### RAG Diagnostics & Tuning (Settings → RAG Tuning)
            - **Chunk Size** slider (200–2000 chars) — controls ingestion chunk granularity
            - **Chunk Overlap** slider (0–500 chars) — cross-boundary context preservation
            - **Top-K Retrieval** slider (1–20 chunks) — how many chunks are injected per query
            - **Show Retrieved Context** toggle — appends the raw retrieved chunks after each RAG answer for full transparency

            ### Download
            | Platform | File |
            |----------|------|
            | Windows | `.msi` or `.exe` installer |

            > **First run:** place a GGUF model in Settings → Model Catalog → Download, then go to Settings → Downloaded → Connect Now.
          releaseDraft: false
          prerelease: false
          projectPath: DocuSage
