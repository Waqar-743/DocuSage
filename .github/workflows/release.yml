name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build (Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: DocuSage/package-lock.json

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Install Protobuf compiler
        uses: arduino/setup-protoc@v3
        with:
          version: "28.x"

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: DocuSage/src-tauri -> target
          cache-all-crates: true

      - name: Install frontend dependencies
        working-directory: DocuSage
        run: npm ci

      - name: Build and create GitHub release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: DocuSage ${{ github.ref_name }}
          releaseBody: |
            ## DocuSage ${{ github.ref_name }} — Hidden Desktop Assistant Mode

            ### What's new

            #### Hidden Desktop Assistant
            - Launches hidden in the background with backend services kept alive
            - Toggles instantly with the global shortcut, default `Alt+Space`
            - Hides to tray instead of closing, preserving active chat state and local RAG state

            #### Window Modes & Tray
            - Adds compact, medium, and full assistant window modes
            - Opens on the current cursor monitor with DPI-aware placement
            - Adds tray actions for show, hide, settings, update check, AI engine restart, and quit

            #### AI Providers
            - Adds provider settings for Local, OpenAI, Anthropic, Google Gemini, OpenRouter, Ollama remote, LM Studio remote, and custom OpenAI-compatible APIs
            - Stores provider credentials through platform secure storage where available
            - Keeps local document indexing private while allowing optional cloud answer generation

            ### Download
            | Platform | File |
            |----------|------|
            | Windows | `.msi` or `.exe` installer |

            > **First run:** use Settings to connect a local model or configure an AI provider, then press `Alt+Space` to summon DocuSage from anywhere.
          releaseDraft: false
          prerelease: false
          projectPath: DocuSage
